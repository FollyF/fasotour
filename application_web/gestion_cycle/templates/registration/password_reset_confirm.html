{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2 class="text-center">Nouveau mot de passe</h2>
  <p class="text-muted text-center">Veuillez entrer et confirmer votre nouveau mot de passe.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success w-100">Changer le mot de passe</button>
  </form>
</div>
{% endblock %}
