


div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <img src="{{ site.photo.url }}" class="img-fluid" alt="Nom du site touristique">
        </div>
        <div class="col-md-6">
            <h1 class="mb-3">{{ site.nom }}</h1>
            <p class="lead">{{ site.description }}</p>
            <p><strong>Prix de visite: </strong>{{ site.tarif }}</p>
            <p><strong>Localisation: </strong> Adresse du site</p>
            <hr>
            <h3>Description complète</h3>
            <p>{{ site.description }}</p>
        </div>
    </div>
</div>
